version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: wnn-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: testdb
      MYSQL_USER: app
      MYSQL_PASSWORD: app123456
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: wnn-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mysql_data: